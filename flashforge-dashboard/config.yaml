name: FlashForge Dashboard
description: >-
  Dashboard locale per stampanti FlashForge AD5M / AD5X / 5M Pro.
  Mostra camera live, stato di stampa, temperature, layer, controlli
  pausa/riprendi/stop, lista file in memoria e upload GCode.
version: "1.0.0"
slug: flashforge_dashboard
init: false
homeassistant: "2023.1"

arch:
  - amd64
  - aarch64
  - armv7
  - armhf

# Ingress: accessibile dalla sidebar di HA senza aprire porte extra.
# NOTA: ingress_port è ora 8100 (porta interna senza auth).
#       La porta 8099 è esposta all'esterno e richiede autenticazione.
ingress: true
ingress_port: 8100
panel_icon: mdi:printer-3d
panel_title: FlashForge
webui: "http://[HOST]:[PORT:8099]"
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Dashboard HTTP (accesso diretto, con auth se configurata)

# Opzioni configurabili dal pannello HA (Add-on → Configurazione)
options:
  printer_ip: ""
  serial_number: ""
  check_code: ""
  mqtt_enabled: true
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_base_topic: "flashforge"
  go2rtc_url: "http://ccab4aaf-frigate:1984"  # URL base di go2rtc (porta 1984 anche se embedded in Frigate)
  go2rtc_stream: "Stampante"                   # Nome dello stream configurato in Frigate/go2rtc
  # Credenziali per l'accesso diretto sulla porta 8099.
  # Se lasciate vuote, la porta 8099 non richiede autenticazione.
  auth_username: ""
  auth_password: ""

schema:
  printer_ip: str
  serial_number: str
  check_code: str
  mqtt_enabled: bool
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_base_topic: str
  go2rtc_url: str?
  go2rtc_stream: str?
  auth_username: str?
  auth_password: password?

url: "https://github.com/MikManenti/flashforge-api-docs"
