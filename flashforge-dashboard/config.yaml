name: FlashForge Dashboard
description: >-
  Dashboard locale per stampanti FlashForge AD5M / AD5X / 5M Pro.
  Mostra camera live, stato di stampa, temperature, layer, controlli
  pausa/riprendi/stop, lista file in memoria e upload GCode.
version: "1.0.0"
slug: flashforge_dashboard
init: false
homeassistant: "2023.1"

arch:
  - amd64
  - aarch64
  - armv7
  - armhf

# Ingress: accessibile dalla sidebar di HA senza aprire porte extra
ingress: true
ingress_port: 8099
panel_icon: mdi:printer-3d
panel_title: FlashForge

# Opzioni configurabili dal pannello HA (Add-on → Configurazione)
options:
  printer_ip: ""
  serial_number: ""
  check_code: ""

schema:
  printer_ip: str
  serial_number: str
  check_code: str

url: "https://github.com/MikManenti/flashforge-api-docs"
