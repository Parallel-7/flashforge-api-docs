  # --- FlashForge Custom Commands (File & System) ---

  M661:
    summary: List all print files on SD card
    description: >
      Return a list of all printable files stored on the printer's SD card (/data directory).

      **File Extension Filtering:**
      Only returns files with these extensions:
      - `.g` - G-code files
      - `.gx` - FlashForge encrypted G-code format
      - `.gcode` - Standard G-code files

      **Response Format:**
      **Success:**
      ```
      CMD M661 Received.
      info_list.size: <count>
      <filename1>
      <filename2>
      ...
      ```

      **No Files:**
      ```
      CMD M661 Error.
      ```
    args: None
    response: >
      CMD M661 Error.
      info_list.size: <count>
      <filename1>
      <filename2>
      ...
    example: "~M661"
    notes: >
      - Searches in /data directory
      - Filters by supported extensions
      - Returns count followed by filenames
      - **Internal Implementation:** File count is calculated via `(size >> 2) * -0x33333333`, effectively dividing the vector size by 12 bytes per entry.
      - Used for file browser UI

  M662:
    summary: Get thumbnail image from G-code file
    description: >
      Extract embedded thumbnail image from a G-code file header.

      **Image Format:**
      - PNG format
      - Embedded in G-code file header
      - Size varies (typically ~60-800 bytes)

      **Fallback:**
      If no embedded image exists, returns default image from:
      `/usr/share/G_File.png`

      **Binary Data Format:**
      ```
      uint32_t magic: 0x2a2a2aa2 (big-endian: 0xa2a22a2a)
      uint32_t length: image data length (big-endian)
      uint8_t data[length]: PNG image bytes
      ```

      **Response Format:**
      **Success:**
      ```
      CMD M662 Received.
      ack header length: <header_length>
      <binary PNG data>
      ```

      **Error:**
      ```
      CMD M662 Received.
      Error: File not exists
      ```
    args:
      filename: string # Name of file (with or without .g/.gcode extension)
    response: >
      CMD M662 Received.
      Error: File not exists

      OR

      CMD M662 Received.
      ack header length: <length>
      <binary PNG data>
    example: "~M662 calibration.g"
    notes: >
      - Extracts thumbnail from G-code header
      - Returns PNG image data
      - Falls back to default image if missing
      - Used for UI thumbnails
      - Binary response format with magic number

  M663:
    summary: Get current position with extrusion flow
    description: >
      Query the current print head position with extrusion flow information.

      **Response Format:**
      ```
      CMD M663 Received.
      ok
      ```

      **Note:**
      This command is similar to M114 but may provide enhanced position data.
      Actual response format needs verification with live printer.
    args: None
    response: >
      CMD M663 Received.
      ok
    example: "~M663"
    notes: >
      - Enhanced position query
      - May include extrusion flow data
      - Similar to M114 but with more details

# Protocol Details
protocol:
  port: 8899
  command_prefix: "~"
  line_terminator: "\\r\\n"
  response_prefix: "ack:"
  max_connections: 10
  connection_timeout: 30 # seconds
  recv_timeout: 5 # seconds
  binary_mode: "M28/M29" # File upload uses binary mode

# Build Volume
build_volume:
  x: 150  # mm
  y: 150  # mm
  z: 150  # mm
  origin: "front-left corner" # (0,0,0)

# Temperature Limits
temperature_limits:
  extruder_max: 265  # Celsius (configurable)
  bed_max: 100       # Celsius (typical)
  extruder_min: 0       # Celsius (room temp)
  bed_min: 0           # Celsius (room temp)

# Fan Specifications
fan:
  type: "part cooling"
  control: "on/off only"
  speed_range: "fixed (100% when on)"
  extruder_fan: "automatic (hotend temperature controlled)"

# LED Support
led:
  built_in: false
  accessory_only: true
  control: "on/off via M146"
  internal_commands: "M144 (ON), M145 (OFF)"

# Print File Support
file_formats:
  supported:
    - ".g"    # G-code files
    - ".gx"   # FlashForge encrypted G-code
    - ".gcode" # Standard G-code
  storage_path: "/data"
  upload_protocol: "binary M28/M29"
  max_filesize: "4GB (FAT32 limit)"

# Network Services
network:
  tcp_port: 8899
  http_port: 8080
  http_purpose: "Camera streaming (MJPG)"
  multicast: "Yes (M601/M602 control)"
  authentication: "None (port 8899 unauthenticated)"

# Firmware Information
firmware:
  version: "v1.3.7 20230725"
  machine_type: "FlashForge Adventurer III"
  model_id: "X: 1.0 Y: 0.5"
  serial_source: "Configuration file (SerialNoFile)"
  mac_source: "/etc/MAC file"

# Comparison with 5M/AD5X Series
differences_from_5m_series:
  - "No HTTP REST API on port 8898 (TCP only control)"
  - "No authentication required on port 8899"
  - "Fan control is on/off only (no variable M106 S0-255)"
  - "No built-in camera (accessory LED support only)"
  - "Different set of custom M-codes (600/66x series)"
  - "M108 command is stubbed out (non-functional)"
  - "No material station or multi-color printing"
  - "Simpler networking (M601/M602 only)"
  - "No air filtration or TVOC monitoring"
  - "Build volume: 150x150x150mm (smaller than newer models)"
